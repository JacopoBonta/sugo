rules:
  branch_patterns:
    - "^(feat|fix|hotfix|chore)/[a-z0-9-]+-[a-z]+-[0-9]+$"
    - "^release/v[0-9]+\\.[0-9]+\\.[0-9]+$"
  conventional_commit: true
  trailing_ticket_pattern: "[a-z]+-[0-9]+$"
  required_labels: []
  spec_files:
    - specs/rules.composer.md

lint:
  command: golangci-lint
  args: [ "run", "--out-format", "json", "--timeout", "5m" ]
  paths: []
  severity_overrides:
    godot: low
    gochecknoglobals: low
  spec_files:
    - path: specs/codestyle.go.md
      extensions: [ ".go" ]
    - path: specs/codestyle.ts.md
      extensions: [ ".ts", ".tsx" ]

llm:
  provider: mimir
  model: vllm/mimir
  base_url: "https://mimir.cubbit.dev/v1" # set to your mimir base URL

jira:
  base_url: "" # set to your Jira instance URL
  project_key: ""

# Per-agent system prompt overrides (optional).
# Point each to a markdown file to override the embedded default.
agents:
  rules:
    prompt: ""
  lint:
    prompt: ""
  logic:
    prompt: ""
  focus:
    prompt: ""
  analysisgap:
    prompt: ""
